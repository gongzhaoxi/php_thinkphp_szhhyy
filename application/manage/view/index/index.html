<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>佛山市微元科技-扫码报工系统</title>

<link href="__STATIC__/theme/manage/css/bootstrap.min.css?v={php}echo time();{/php}" rel="stylesheet">
<link href="__STATIC__/theme/manage/css/bootstrap-table.css?v={php}echo time();{/php}" rel="stylesheet">
<link href="__STATIC__/theme/manage/css/styles.css?v={php}echo time();{/php}" rel="stylesheet">

<!--[if lt IE 9]>
<script src="__STATIC__/theme/manage/js/html5shiv.js?v={php}echo time();{/php}"></script>
<script src="__STATIC__/theme/manage/js/respond.min.js?v={php}echo time();{/php}"></script>
<![endif]-->

</head>

<body>
	
	{include file="public/header" /}	
	{include file="public/menu" /}	
	
	<div class="col-sm-9 col-sm-offset-3 col-lg-10 col-lg-offset-2 main">			
		<div class="row">
			<ol class="breadcrumb">
				<li><a href="#"><span class="glyphicon glyphicon-home"></span></a></li>
				<li class="active">站点列表</li>
			</ol>
		</div>
		
		<div class="row">
			<div class="col-lg-12">
				<h1 class="page-header">所有站点</h1>
			</div>
		</div>
				
		
		<div class="row">
			<div class="col-lg-12">
				<div class="panel panel-default">
					<div class="panel-heading">
						<a class="btn btn-primary" href="{:url('Index/add_site')}">新增站点</a>
					</div>
					<div class="panel-body">
						<table data-toggle="table">
						    <thead>
						    <tr>
						        <th>序号</th>
						        <th>状态</th>
						        <th>项目标识</th>
						        <th>名称</th>
						        <th>域名</th>
						        <th>账号</th>
						        <th>添加时间</th>
						        <th>操作</th>
						    </tr>
						    </thead>
						    {volist name="list" id="vo"}
						     <tr>
						     
						        <td data-field="id" data-checkbox="true" >{$vo['id']}</td>
						        <td data-field="status" data-sortable="true">{php} echo $vo['status']>0?'开启':'关闭';{/php}</td>
						         <td data-field="name"  data-sortable="true">{$vo['tag']}</td>
						        <td data-field="name"  data-sortable="true">{$vo['sitename']}</td>
						        <td data-field="domain" data-sortable="true">{$vo['domain']}</td>
						        <td data-field="price" data-sortable="true">{$vo['account']}</td>
						        <td data-field="" data-sortable="true">{$vo['addtime']}</td>
						        <td data-field="" data-sortable="true">
						        	<a href="{:url('Index/add_site',array('id'=>$vo['id']))}">编辑 </a>| <a href="javascript:void(0);" onclick="delete_site({$vo['id']})">删除</a>
						        </td>
						    </tr>
						    {/volist}
						</table>
					</div>
				</div>
			</div>
		</div>

		
		
	</div>

	<script src="__STATIC__/theme/manage/js/jquery-1.11.1.min.js"></script>
	<script src="__STATIC__/theme/manage/js/bootstrap.min.js?v={php}echo time();{/php}"></script>
	<script src="__STATIC__/theme/manage/js/bootstrap-table.js?v={php}echo time();{/php}"></script>
	<script src="__STATIC__index/js/layer/layer.js"></script>
	<script>
		!function ($) {
			$(document).on("click","ul.nav li.parent > a > span.icon", function(){		  
				$(this).find('em:first').toggleClass("glyphicon-minus");	  
			}); 
			$(".sidebar span.icon").find('em:first').addClass("glyphicon-plus");
		}(window.jQuery);

		$(window).on('resize', function () {
		  if ($(window).width() > 768) $('#sidebar-collapse').collapse('show')
		})
		$(window).on('resize', function () {
		  if ($(window).width() <= 767) $('#sidebar-collapse').collapse('hide')
		})
		
		function delete_site(id){
			layer.confirm('确认要删除站点吗？', {
				  btn: ['确认','取消']
				}, function(){
					$.ajax({
						  url: "{:Url('Index/delete_site')}",
						  data:{"id":id},
						  dataType:"json",
						  type:'POST',
						  success:function(obj){
							  //console.log(obj);
							  if(obj.status==1){
								  layer.msg('删除成功');
								  setTimeout(function(){
									  window.location.reload();
						    		}, 2000);
							  }else{
								  layer.msg(obj.msg);
							  }
						  }
					  })
					
				}, function(){
				  
				});
		}
	</script>	
</body>

</html>
