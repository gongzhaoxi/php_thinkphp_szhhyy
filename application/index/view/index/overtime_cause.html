<!DOCTYPE html PUBLIC '-//W3C//DTD HTML 4.01 Strict//EN' 'http://www.w3.org/TR/html4/strict.dtd'>
<html>
<head>
<meta http-equiv='Content-Type' content='text/html; charset=UTF-8'>
<script src="__STATIC__/theme/index/js/jquery-1.10.2.js"></script>
<link href="__STATIC__index/css/index.css" rel="stylesheet" type="text/css"/>
<title>订单超时原因</title>
</head>
<style type="text/css">
	.xiug{width: 100%;margin-left: 30px;margin-top: 40px;}
	.xiug input{width: 110px;height: 40px;border-radius: 10px;text-align: center;}	
.order{display:block;width:80%;margin-left:10%;height:auto;margin-bottom:50px;border-radius:8px;}
.order div{width:100%;text-align:center;margin-top:10px;font-size:14px;}
.order div input{padding-left:4px;width:70%;height:30px;line-height:30px;border-radius:4px;border:0;margin-top:4px; font-size:12px;}
.order div .spa{letter-spacing:4px;}
.order div textarea{padding: 8px;width: 76%;border-radius: 6px;}
.order div select{padding-left:4px;width:70%;height:30px;line-height:30px;border-radius:4px;border:0;margin-top:4px; font-size:12px;}
.btn{width: 70px;height: 30px;line-height: 30px;background: #7EC0EE;border: none;color: #fff;border-radius: 5px;display:inline-block;cursor:pointer;}
.order div input.inputtxt{width:100px;border-bottom:solid 1px #458B00;border-radius:0;text-align:center;}
.child3{background:none;color:#50a120;text-decoration: none;width:100px;}
</style>
<body>
<div class="order">

	<form action="" method="post">
	<div><span>超时原因：</span>{$order['unique_sn']}</div>

	<div>
		<textarea id="note" style="width:350px;height:150px;">{$order['cause']}</textarea>
	</div>
	<div>
	<a  href="javascript:void(0);" class="btn " onclick="javascript:toReport(2);" >保存</a>
	</div>

	</form>
	
</div>

<script src="__STATIC__index/js/jquery.min.js"></script>
<script src="__STATIC__index/js/layer/layer.js"></script>
<script src="__STATIC__index/js/laydate/laydate.js"></script>
<script type="text/javascript">

var orderid="{$order['id']}";

function toReport(){
	var note=$("#note").val();
	$.ajax({
		  url: "{:Url('Index/save_cause')}",
		  data:{"orderid":orderid,"note":note},
		  dataType:"json",
		  type:'POST',
		  success:function(obj){
			  //console.log(obj);
			  if(obj.status==1){
				  layer.msg('保存成功');
				  setTimeout(function(){
					  parent.reload_window();
		    		}, 2000);
			  }else{
				  layer.msg(obj.msg);
			  }
		  }
	  })
}

</script>
</body>
</html>
