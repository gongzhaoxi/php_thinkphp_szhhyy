<!DOCTYPE html PUBLIC '-//W3C//DTD HTML 4.01 Strict//EN' 'http://www.w3.org/TR/html4/strict.dtd'>
<html>
<head>
<meta charset="UTF-8">
<title>超时工序订单汇总</title>
</head>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
{include file="public/header" /}
</head>
<style>
.layui-search {padding: 12px}
.now {height: 32px;line-height: 32px}
.form-inp {height: 32px;line-height: 32px}
.popup-box .popup-body{height: 100%;}
.body-center{width:100%;height:100%;overflow-y:auto;}
</style>
<body>
	<div class="baogong_order popup-box">
		<div class="popup-header">
			<div>超时工序订单汇总</div>
		</div>
		<div class="popup-body">
			<div class="body-center">
				<div class="layui-search">
					<form class="layui-form" action="{:url('Index/overtime_gx_order')}"
						method="post">
						<input class="form-inp" name="produce_no" type="text"
							placeholder="请输入生产单号"> <input class="form-inp"
							name="finish_time" id="finish_time" type="text"
							placeholder="请选择要求完成日期">
						<button type="submit" class="layui-btn now">搜索</button>
					</form>
				</div>
				<div class="overtime_content">
						{volist name="list" id="vl"}
						<div class="ct-li">
								<div class="li-left">
									<div class="gx-name">{$vl['gxname']}</div>
									<div class="msg-data">
										<div>单数：{$vl['count']}条 | 面积：{$vl['area']}㎡</div>
										<div>玻扇：{$vl['bs_num']}扇 | 纱扇：{$vl['ss_num']}扇</div>
									</div>
								</div>
								<div class="li-right">
									{volist name="vl.order_list" id="rl"}
									<div class="li-r-msg">{$rl['ordersn']}（{$rl['endtime']}
										超：{$rl['day']}天）</div>
									{/volist}
								</div>
						</div>
						{/volist}
				</div>
			</div>
		</div>
	</div>
</body>
<script>
	var layer, laydate;
	layui.use(['layer','laydate'],function(){
		layer = layui.layer;
		laydate = layui.laydate;
		laydate.render({
			elem: '#finish_time',
		});
	});
</script>
</html>
