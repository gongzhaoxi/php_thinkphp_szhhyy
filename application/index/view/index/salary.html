<script src="__STATIC__index/js/laydate/laydate.js"></script>
<script type="text/javascript">
laydate.render({
	  elem: '#year' //指定元素
	  ,range: true
	});
laydate.render({
	  elem: '#inyear' //指定元素
      ,range: true
	});
function detail(e){
	var uid = $(e).attr('data-uid');
	var did = $(e).attr('data-did');
	var uname = $(e).attr('data-uname');
	var dw = $(e).attr('data-dw');
	var gx = $(e).attr('data-gx');
	/* var allid = $(e).attr('data-id'); */
	var price = $(e).attr('data-price');
	var jnum = $(e).attr('data-jnum');
	//搜素条件
	var status = $('#entry').val();
	var pdn = $('#pdn').val();
	var salenum = $('#salenum').val();
	var b_date = $('#year').val();
	var in_date = $('#inyear').val();
	
	layer.open({
		type: 2,
		  title: '员工：'+uname+'【'+gx+'】'+'| 计件单位：'+dw+' | 计件数量：'+jnum+' | 单价：'+price,
		  shadeClose: true,
		  shade: 0.8,
		  area: ['80%', '80%'],
		  content: "salarydetail?uid="+uid+"&did="+did+"&status="+status+"&pdn="+pdn+"&salenum="+salenum+"&b_date="+b_date+"&in_date="+in_date+"" //iframe的url
	})
}

//数据导出
function outExcel(){
	$('#formd').attr('action',"{:Url('Index/staffSalary')}");
	$('#formd').submit();
	$('#formd').attr('action',"{:Url('Index/salary')}");
}
