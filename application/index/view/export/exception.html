<div class="fm-li-content-test" id="printbtn" style="background-color:#E40A5D;cursor:pointer;border-radius: 50%;position:fixed;bottom:20%;right:200px;">
<div class="fm-content-test"><span><i class="fa fa-cog">打印</i></span></div>

<script>
$(function(){
    var window_height = $(window).height();
    var pagesize = Math.round((window_height-$('#tr').height()-$('#th_head').height()-20)/41)-1;
    refresh(pagesize);
    setInterval("refresh("+pagesize+")",20000); 
})

function refresh(pagesize){
    $.ajax({
        url:"{:url('Databoard/exception')}",
        data: {pagesize:pagesize,page:$('#page').val()},
        type: 'POST',
        dataType: 'json',
        success:function(res){
            $('#last').text(res.last);
            $('#current').text(res.current);
            $('#year').text(res.year);
            $('#no_handle').text(res.no_handle);
            var html = '';
            $.each(res.list,function(k,v){
                html += "<tr>";
                html += "<td class='gaou fonta'>"+v['unique_sn']+"</td>";
                html += "<td class='cofff fonta'>"+v['uname']+"</td>";
                html += "<td class='wtov cofff fonta'>"+v['error_time']+"</td>";
                html += "<td class='cofff fonta utwf'>"+v['dname']+"</td>";
                html += "<td class='cofff fonta'>"+v['stext']+"</td>";
                html += "</tr>";
            })
            $('#page').val(res.page+1);
            $('#th_head').nextAll().remove();
            $('#table1').append(html);
            
            $("#printbtn").click(function(){
            	$(this).hide();
            	window.print();
            	$(this).show();
            })
        }
    })
}
    
</script>
