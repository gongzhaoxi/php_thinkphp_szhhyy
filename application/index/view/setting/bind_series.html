<!DOCTYPE html PUBLIC '-//W3C//DTD HTML 4.01 Strict//EN' 'http://www.w3.org/TR/html4/strict.dtd'>
<html>
<head>
<meta http-equiv='Content-Type' content='text/html; charset=UTF-8'>
<link href="__STATIC__index/css/index.css" rel="stylesheet" type="text/css"/>
<title>设置</title>
<style type="text/css">
.content{margin:20px 20px;}
.left{ background:#fff; border:1px solid #EAEAEA;float:left; width:140px; padding:25px 10px; margin-right:30px;border-radius: 5px 5px 5px 5px}
.left li{ float:left; width:140px; text-align:center; font-size:16px; line-height:55px; border-bottom:1px solid #eee;}
.left li a{ color:#333;}
.left li a:hover{ color:#01a0fb;}
.left li a.paa{ color:#01a0fb;}
.right{}
.add-user button{width:70px;height:34px;line-height:34px;border:0;outline:none;text-align:center;background:#1874CD;color:#fff;font-size:13px;border-radius:8px;}
.u-pages{box-shadow:0px 2px 0px #A3A3A3;background:#CFCFCF;font-weight:bold;margin-top:10px;width:100%;height:50px;line-height:50px;border: 1px solid #EAEAEA;}
.u-pages ul li{}
.u-pages ul{display:flex;}
.row-line{width:1px;height:50px;background:#EAEAEA;}
.user{display:none;width:30%;height:auto;background:#E3E3E3;position:absolute;z-index:9999;left:36%;top:30%;border-radius:8px;}
.user div{width:100%;text-align:center;height:40px;line-height:40px;margin-top:30px;font-size:14px;}
.user div input{padding-left:4px;width:70%;height:40px;line-height:40px;border-radius:4px;border:0;margin-bottom:6px;}
.user div .spa{letter-spacing:8px;}
.btne{width:150px;height:40px;line-height:40px;background:#FF4040;color:#fff;border:0;outline:none;border-radius:8px;margin-left:35%;margin-top:18px;margin-bottom:10px;}
.role{width: 70%;height: 40px;border-radius: 6px;border: none;}
.mb{display:none;width:100%;height:100%;background:black;opacity:0.6;position:fixed;z-index:1000;}
.u-user-li{border-left:1px solid #EAEAEA;border-right:1px solid #EAEAEA;border-bottom:1px solid #EAEAEA;width:100%;height:50px;line-height:50px;}
.u-user-li ul{display:flex;}
.role{width: 70%;height: 40px;border-radius: 6px;border: none;}
.add-role .j-name{width:100%;height:40px;line-height:40px;margin-top:14px;font-size:18px; font-weight:bold}
.add-role .j-name input{padding-left:4px;width:100px;height:40px;line-height:40px;border-radius:4px;border:1px soloid #EAEAEA;margin-bottom:6px;}
.titletxgq{width:90%;margin-left: 4%;margin-top: 20px;}
.titletxgqmw{width:90%;margin-left:4%;margin-top: 20px; border:1px solid #E8E8E8; font-size:12px; padding:10px;}
.gqge{width:81px;line-height:30px; float:left;}
.all-inp{font-size: 14px;width: 60px;height: 20px;line-height: 20px;display: flex;margin-bottom: 10px;}
.all-inp input{margin-top: 2px;}
.titletxgq{ width:100%; height:40px; font:bold 14px/40px "微软雅黑"; color:#333;background:#fff;margin:0;float:left;}
.titletxgqmw{ width:97%; height:auto; margin-top:10px; margin-bottom:20px; background:#e9e9e9; border:1px solid #e2e2e2; padding:1%; float:left;margin-left:0;}
.titletxgqmw .gqge{ float:left; width:auto; font:12px/25px "微软雅黑"; color:#333; padding-right:10px;}
label {display: inline-block;margin-bottom: 5px;font-weight: bold;}
</style>

</head>
<body>
	<div class="mb"></div>
	<div class="content">
		
		<div class="right">
		<!-- 用户录入 -->
			<div class="add-role">
		<form>
			<div class="" style="width: 100%;height: 40px;line-height: 40px; border-bottom:1px solid #999;line-height: 40px;font-weight: bold;font-size: 16px;">
				<span style="padding:10px; border-bottom:2px solid #000">系列名称：</span>
			</div>
			
			<div class="titletxgqmw">
			<div class="all-inp"><input type="checkbox" name="allsel" id="ath" onchange="Allsel()" /> 全选</div>
			
			
			
				<div class="gqge">
                                    {volist name="series" id="v"}
                                    <label style="margin: 10px 5px;">
                                        <input type="checkbox" name="allsel" value="{$v.id}" {if condition="in_array($v['id'],$binded)"}checked{/if}/>{$v.xname}
                                    </label>	
                                    {/volist}
				</div>
					
				
                                <div style="clear:both;"></div>
				</div>
                        <input name="user_id" id="user_id" type="hidden" value="{$uid}"/>
			</form>
			<button class="btne">保存</button>
		</div> 
		</div>
	</div>
	<script src="__STATIC__index/js/jquery.min.js"></script>
	<script src="__STATIC__index/js/layer/layer.js"></script>
	<script type="text/javascript">
	
	$('.btne').click(function(){
		var uid = $('#user_id').val();
                var name = [];
                $('.gqge input').each(function(i){
                    if($(this).attr('checked') == 'checked'){
                        name.push($(this).val());
                    }
                })
		 $.ajax({
			url:"{:Url('Setting/bind_series')}",
			data:{id:uid,series:name},
			type: 'POST',
			dataType:'json',
			success:function(res){
				if(res.status==0){
                                    var index = parent.layer.getFrameIndex(window.name);// 获得frame索引 
					layer.msg('绑定成功',function(){
                                            parent.layer.close(index);//关闭当前frame
                                        });
	
				}else{
                                    layer.msg('绑定失败');
                                }
			}
			
		},'json')
			
		});
	
	//全选
	function Allsel(){
            if($('#ath').attr('checked') == 'checked'){
                $('.gqge input').each(function(){
                    $(this).attr('checked',true);
                })
            }else{
                $('.gqge input').each(function(){
                    $(this).attr('checked',false);
                })
            }
		
	}
	</script>
</body>
</html>
