<!DOCTYPE html>
<html lang="zh-cn">

<head>
<meta name="referrer" content="never">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>生产进度扫码报工系统</title>
<link href="__STATIC__index/css/index.css" rel="stylesheet" />
<style type="text/css">
.user{display:block;width:90%;height:auto;background:#E3E3E3;padding:10px 10px;margin:0 16px;border-radius:8px;}
.user div{width:100%;text-align:center;height:40px;line-height:40px;margin-top:20px;font-size:14px;}
.user div input{padding-left:4px;width:70%;height:40px;line-height:40px;border-radius:4px;border:0;margin-bottom:6px;}
.user div .spa{letter-spacing:8px;}
.btne{width:200px;height:40px;line-height:40px;background:#FF4040;color:#fff;border:0;outline:none;border-radius:8px;cursor:pointer; margin-top:20px; margin-right:10px; float:right;}
.role{width: 70%;height: 40px;border-radius: 6px;border: none;}
.mb{display:none;width:100%;height:100%;background:black;opacity:0.6;position:fixed;z-index:1000;}
.true{}	
</style>
</head> 

<body>
<div class="top">
<button class="btne" data-id="{$list.id}">确认无误，更新系列！</button>
<!-- <div class="t_01">当前账号：admin / <a href="{:Url('Index/loginout')}">退出登录</a></div> -->
</div>
<div class="menu">
</div>

		<!-- 系列录入 -->
			<div class="user">
			<form action="#" id="form" method="post">
				<div><span>系列名称：</span><input type="text" name="user" id="user" autocomplete="off" value="{$list.xname}"/></div>
				{if $list.pid !== null}<div><span>工艺路线：</span>
					<select class="role" id="role">
						{volist name="xid" id="vl"}
							<option name="rl" {if condition="$list['gid'] eq $vl['id']"}selected="selected"{/if}value="{$vl.id}">{$vl.title}</option>
							{/volist}
						</select>
				</div>{/if}
	</form>
	
</div>
	<!-- 用户录入end -->
	<script src="__STATIC__index/js/jquery.min.js"></script>
	<script src="__STATIC__index/js/layer/layer.js"></script>
	<script type="text/javascript">
	$(document).ready(function(){
		var ide = $("input[name='rl']");
		var selectid = "{$list.gid}";

		
		$("#role").change(function(){
			var _text=$(this).find("option:selected").text();
				$("#user").val(_text);
		})
	});
	
		$('.btne').click(function(){
			var title = $("#user").val();
			var type = "<?php echo $list['type']?>";
			var id = $(this).data('id');
			if(title==''){
				layer.msg("请输入系列名称");
				return false;
				}
			var data = {};
				data['title'] = title;
				data['id'] = id;
				data['type'] = type;
			if(type==1){
				var gid = $('#role').val();
				if(gid==''){
					layer.msg("请选择绑定工艺路线");
					return false;
					}
				data['gid'] = gid;
			}
			console.log(data);
			$.ajax({
				url: "{:Url('Setting/series_edit')}",
				data: data,
				dataType: 'json',
				success:function(obj){
					
					var index = parent.layer.getFrameIndex(window.name);
					if(obj.code==0){
						layer.msg('修改成功');
						setTimeout(function(){
							window.parent.location.reload();
						},1500);
					}else{
						layer.msg('缺少参数');
						
					}
				}
			})
		});
		
		
	</script>

</body>
</html>
