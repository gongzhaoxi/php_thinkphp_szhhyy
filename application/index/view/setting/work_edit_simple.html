<script src="__STATIC__index/js/layer/layer.js"></script>
<script type="text/javascript">
$('.btne').click(function(){
	var title=$('#gxname').val();//工艺名称
	var day=$('#day').val();//总周期
	var id = "{$list['id']}";//工艺线的ID
	var dname='';//拼接所有的工序名称
	var groups=new Array();//所有的组的信息
	var gxs=new Array();//所有每组微小工序的信息
	
	//获取所有组的信息
	$(".gname").each(function(){
		
		var gid=$(this).attr("data-id");//获取到组的ID
		var gtemp={};
			gtemp.id=gid;
			gtemp.name=$(this).val();
			gtemp.state=$("#gstate"+gid).val();//出入库
			groups.push(gtemp);
	});
	
	var i=0;
	$(".gxname").each(function(){
		var gxid=$(this).attr("data-id");//获取到组的ID
		var gx={};
			gx.id=gxid;
			gx.name=$(this).val();
			gx.day=$("#gxday"+gxid).val();//变成量值
			gx.unit=$("#work_unit"+gxid).val();//单位
			gx.state=$("#gxstate"+gxid).val();//报开始和结束状态
			//报数量
			if($("#gxnum"+gxid).attr("checked")){
				gx.need_num=1;
			}else{
				gx.need_num=0;
			}
			gxs.push(gx);
			
			if(i==0){
				dname+=gx.name;
		    }else{
		    	dname+=","+gx.name;
	        } 
			i++;
	})
	

	 var data = {};
     data['id']=id;
     data['day']=day;
     data['title'] = title;
     data['dname'] = dname;//整个工艺线名称
     data['groups'] = groups;
     data['gxs'] = gxs;

   	$.post("{:Url('Setting/editgx')}",data,function(obj){
       if(obj.code==1){
         layer.msg('已修改成功');
         var index=parent.layer.getFrameIndex(window.name);
         setTimeout(function(){
        	 parent.layer.close(index);
        	 window.parent.location.reload();
         },2000)
       }else{
    	   layer.msg('保存失败，请重试');
       }
     },'json');

   	
})

</script>
