        <script src="__STATIC__/js/jquery.min.js" type="text/javascript"></script>
        <script src="__STATIC__/js/xcity.js?v=<?php echo time()?>" type="text/javascript"></script>
        <script>layui.use(['form', 'layer','upload','code'],
            function() {
                $ = layui.jquery;
                form = layui.form,
                layer = layui.layer;
                
                layui.code();                
                $('#end').xcity('{$res.province}','{$res.city}','{$res.area}');
                
                 var upload = layui.upload;
                //执行上传实例
                var uploadInst = upload.render({
                    elem: '#test1' //绑定元素
                    , url: "{:url('bom/upload')}" //上传接口
                    , size: 8000 //限制文件大小，单位 KB
                    , method: 'post'
                    , fileAccept: 'image/*'
                    , exts: "jpg|png|gif|bmp|jpeg|pdf"
                    , done: function (res) {
                        //上传完毕回调
                        $('#picbox').css('display','block');
                        $('#prepic').attr('src', "/upload/" + res.data);
                        $('#pic').val(res.data);
                    }
                    , error: function () {
                        //请求异常回调
                    }
                });

                form.on("select(area)",function(data){
                    $.post("{:url('findcode')}",{area:data.value},function(obj){
                        if(obj.code == 0){
                            $('#code').val(obj.data.code);
                        }else{
                            $('#code').val('');
                        }
                    },'json')
                })

                //监听提交
                form.on('submit(add)',
                function(data) {
                    ajaxform("{:url('dealer/edit')}",data.field);
                    return false;
                });

            });</script>

    </body>
