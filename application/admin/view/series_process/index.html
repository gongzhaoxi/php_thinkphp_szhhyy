{include file="public/header"/}
<body>
<link rel="stylesheet" href="__STATIC__/css/select.css">
<div class="layui-card">
	<div class="layui-card-body">
		<form class="layui-form" action="">
			<div class=" layui-inline">
				<select name="process_id" xm-select="process_id"  xm-select-search  xm-select-search-type="dl" xm-select-radio>
					<option value="">工序</option>
					{foreach $process as $key=>$vo}
					<option value="{$vo['id']}">{$vo['name']}</option>
					{/foreach}
				</select>	
			</div>
			<div class=" layui-inline" style="width:400px;">
				<select name="series_id" id="series_id" xm-select="series_id"  xm-select-search  xm-select-search-type="dl" xm-select-radio>
					<option value="">系列</option>
					{foreach $series as $key=>$vo}
					<option value="{$vo['id']}">{$vo['name']}</option>
					{/foreach}
				</select>
			</div>					
			<div class="layui-inline">
				<button class="layui-btn  layui-btn-primary" lay-submit lay-filter="query"><i class="layui-icon layui-icon-search"></i>查询</button>
			</div>
		</form>
	</div>
</div>
	<div class="layui-card">
		<div class="layui-card-body">
			<table id="dataTable" lay-filter="dataTable"></table>
		</div>
	</div>
	<script type="text/html" id="toolbar">
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>新增</button>
		<button type="button" class="layui-btn layui-btn-sm" lay-event="edit"><i class="layui-icon">&#xe642;</i>编辑</button>
		<button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="batchRemove"><i class="layui-icon layui-icon-delete"></i>删除</button>
		<button type="button" onclick="location.reload()"  class="layui-btn  layui-btn-primary"><i class="layui-icon">&#xe9aa;</i>刷新</button>
	</script>
	<script type="text/html" id="options">
		<button class="layui-btn layui-btn-normal layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></button>
		<button class="layui-btn layui-btn-danger layui-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i></button>
	</script>	
    </body>
    <script>
	layui.config({
		base: "/static/js/",
	}).extend({
		select: "select",
	}).use(['table', 'form', 'jquery','select'],function() {
		let table = layui.table;
		let select = layui.select;
		let form = layui.form;
		let $ = layui.jquery;
		table.render({
			elem: '#dataTable',
			url: '{:url('index')}',
			page: true,
			limit: 20,
			limits:[20,40,60,80,100],
			height:'full-130',			
			cols: [[
				{type: 'checkbox'},
				{field: 'series_name',title: '系列',align: 'center'},
				{field: 'process_name',title: '工序',align: 'center'},
				{field: 'sort',title: '排序',align: 'center'},
				{field: 'remark',title: '备注',align: 'center'},
				{title: '操作',toolbar: '#options',align: 'center',width: 130,unresize:true}
			]],
			cellMinWidth: 100,
			//skin: 'line',
			toolbar: '#toolbar',
			defaultToolbar: false
		});

		table.on('sort(dataTable)', function(obj){
			table.reload('dataTable', {
				initSort: obj,
				where: {
					sort: obj.field,
					order: obj.type
				}
			},true);
		});

		table.on('tool(dataTable)', function(obj) {
			if (obj.event === 'remove') {
				layer.confirm('确定要删除这些系列工序？',
					function(index) {
						ajaxform("{:url('del')}",{ids:[obj.data['id']]},3);
					}
				);				
				
			} else if (obj.event === 'edit') {
				xadmin.open('修改系列工序','{:url('edit')}?id='+obj.data['id'],700, 650);
			}
		});

		table.on('toolbar(dataTable)', function(obj) {
			if (obj.event === 'add') {
				xadmin.open('新增系列工序','{:url('add')}?series_id='+(select.value('series_id').length>0?select.value('series_id')[0]['value']:''),700, 650);
			}else if (obj.event === 'refresh') {
				table.reload('dataTable');
			}else if (obj.event === 'batchRemove') {
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				var ids = [];
				for(var i in checkStatus.data) {
					ids.push(checkStatus.data[i].id);
				}
				layer.confirm('确定要删除这些系列工序？',
					function(index) {
						ajaxform("{:url('del')}",{ids:ids},3);
					}
				);
			}else if (obj.event === 'edit') {
				var checkStatus = table.checkStatus('dataTable');
				if(checkStatus.data.length == 0){
					layer.msg('请选择要操作的内容');
					return false;
				}
				if(checkStatus.data.length > 1){
					layer.msg('只能选择单个数据编辑');
					return false;
				}
				xadmin.open('修改系列工序','{:url('edit')}?id='+checkStatus.data[0].id,700, 650);
			}
		});

		form.on('submit(query)', function(data) {
			table.reload('dataTable', {
				where: data.field,
				page:{curr: 1}
			})
			return false;
		});
	})
</script>
</html>
