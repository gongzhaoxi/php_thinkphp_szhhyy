{include file="public/header"/}
    
    <body>
        <div class="x-nav">
            <span class="layui-breadcrumb">
               <a href="javascript:void(0)">用户列表</a>
            </span> 
            
            <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
                <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
            </a>
        </div>
        <div class="layui-fluid">
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-body ">
                            
                        </div>
                        <div class="layui-card-header">
                            <form class="layui-form layui-col-space5" >
                                
                                <div class="layui-input-inline layui-show-xs-block">
                                    <input type="text" name="keyword" placeholder="请输入姓名" autocomplete="off" class="layui-input">
                                </div>
                                <div class="layui-input-inline layui-show-xs-block">
                                    <button class="layui-btn" lay-submit="" lay-filter="sreach">
                                        <i class="layui-icon">&#xe615;</i>
                                    </button>
                                </div>
                                <div class="layui-input-inline" style="float: right">
                                    <a class="layui-btn" href="javascript:void(0)" onclick="xadmin.open('添加用户', '{:url('addUser')}', 700, 650)">
                                        <i class="layui-icon"></i>添加用户
                                    </a>
                                </div>
                            </form>
                        </div>
                        <div class="layui-card-body ">
                            <table class="layui-table layui-form">
                                <thead>
                                    <tr>                                       
                                        <th>登陆名称</th>
                                        <th>姓名</th>
                                        <th>电话</th>
                                        <th>所属角色</th>
                                        <th>职位</th>
                                        <th>入职时间</th>
                                        <th>最后登陆时间</th>
                                        <th>状态</th>
                                        <th>操作</th></tr>
                                </thead>
                                <tbody>
                                    {volist name="list" id="v"}
                                    <tr>
                                        <td>{$v.login_name}</td>
                                        <td>{$v.uname}</td>
                                        <td>{$v.phone}</td>
                                        <td>{$v.role_name}</td>
                                        <td>{$v.job}</td>
                                        <td>{$v.join_time}</td>
                                        <td>{$v.last_login}</td>
                                        <td>
                                            {if condition="$v['is_disable'] eq '0'"}正常{else/}禁用{/if}
                                        </td>
                                        <td class="td-manage">
                                            <a title="编辑" onclick="xadmin.open('编辑用户', '{:url('editUser',array('id'=>$v['id']))}', 700, 650)" href="javascript:void(0)">
                                                <i class="layui-icon">&#xe63c;</i></a>
                                            </a>
                                            <a title="删除" onclick="member_del(this,{$v.id})" href="javascript:;">
                                                <i class="layui-icon">&#xe640;</i>
                                            </a>
                                        </td>
                                    </tr>
                                     {/volist}
                                </tbody>
                            </table>
                        </div>
                        <div class="layui-card-body ">
                            <div class="page">
                                    {$page}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script>layui.use(['laydate', 'form'],
        function() {
            var laydate = layui.laydate;
            var  form = layui.form;
            
            //执行一个laydate实例
            laydate.render({
                elem: '#start' //指定元素
            });

            //执行一个laydate实例
            laydate.render({
                elem: '#end' //指定元素
            });
            
            // 监听全选
            form.on('checkbox(checkall)', function(data){

              if(data.elem.checked){
                $('tbody input').prop('checked',true);
              }else{
                $('tbody input').prop('checked',false);
              }
              form.render('checkbox');
            });
        });

       function sendCar(id){
            layer.confirm('确认要发送吗？',
            function(index) {
                //发异步删除数据
                ajaxform("{:url('sendCar')}",{id:id},1);
            });
       }

        /*删除*/
        function member_del(obj, id) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                ajaxform("{:url('delUser')}",{id:id},1);
            });
        }
    
        
    </script>

</html>
