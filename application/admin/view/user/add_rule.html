{include file="public/header"/}
        <div class="layui-fluid">
            <div class="layui-row">
                <form class="layui-form">
                    <div class="layui-form-item">
                        <label for="username" class="layui-form-label">
                            所属栏目
                        </label>
                        <div class="layui-input-inline">
                            <select name="parent_id">
                                <!-- 只有超级管理组才能添加一级角色组-->
                                <option value="0">顶级栏目</option>
                                {volist name='rule' id='v'}
                                <option value="{$v.id}">{$v.title}</option>
                                {/volist}
                            </select>
                        </div>
                        
                    </div>
                    <div class="layui-form-item">
                        <label for="username" class="layui-form-label">
                            规则路径
                        </label>
                        <div class="layui-input-inline">
                            <input type="text"  name="name" required="" lay-verify="required" class="layui-input" >
                        </div>
                        <div class="layui-form-mid layui-word-aux">

                        </div>
                    </div>
                     <div class="layui-form-item">
                        <label for="username" class="layui-form-label">
                            规则标题
                        </label>
                        <div class="layui-input-inline">
                            <input type="text" name="title" required="" lay-verify="required" class="layui-input" >
                        </div>
                        <div class="layui-form-mid layui-word-aux">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label for="username" class="layui-form-label">
                            是否为菜单
                        </label>
                        <div class="layui-input-inline">
                            <input type="radio"  name="is_menu" class="layui-input" value='0' title='是' checked="">
                            <input type="radio"  name="is_menu" class="layui-input" value='1' title='否'>
                        </div>
                        
                    </div>
                    <div class="layui-form-item">
                        <label for="username" class="layui-form-label">
                            图标
                        </label>
                        <div class="layui-input-inline">
                            <input type="text" name="icon"  class="layui-input" >
                        </div>
                        
                    </div>
                    
                    <div class="layui-form-item">
                        <label for="L_repass" class="layui-form-label"></label>
                        <button class="layui-btn" lay-filter="add" lay-submit="">增加</button>
                    </div>
        </form>
        </div>
        </div>
        <script>layui.use(['form', 'layer'],
            function() {
                $ = layui.jquery;
                var form = layui.form,
                layer = layui.layer;
                
                //监听提交
                form.on('submit(add)',
                function(data) {
                    ajaxform("{:url('user/addRule')}",data.field);
                    return false;
                });
                
            });</script>

    </body>

</html>
