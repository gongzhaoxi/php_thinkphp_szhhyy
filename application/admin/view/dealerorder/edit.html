<body>
    <div class="x-nav">
            <span>
                <!--<a href="">订单信息</a>-->

    <form class="layui-form layui-col-space5">
        <div class="layui-fluid">
            <div class="layui-row layui-col-space15">

                <div class="layui-col-md12 layui-form-item">
                    <div class="layui-card">
                        <div class="layui-card-body ">
                            <blockquote class="layui-elem-quote">基础信息
                            </blockquote>
                            <div class="layui-inline" style="width: 40%;margin-bottom: 15px;">
                                <label class="layui-form-label">订单编号</label>
                                <div class="layui-input-inline" style="width:55%">
                                    <input type="text" name="number" class="layui-input" readonly="true" placeholder="保存订单后自动生成" value="{$res.number}">
                                </div>

                            </div>
                            <div class="layui-inline" style="width: 40%">
                                <label class="layui-form-label">送货地址</label>
                                <div class="layui-input-inline" style="width:55%">
                                    <input type="text" name="send_address"  class="layui-input" value="{$res.send_address}" readonly="true">
                                </div>
                            </div>
                            <div class="layui-inline" style="width: 40%;margin-bottom: 15px;">
							    <label class="layui-form-label">下单日期</label>
							    <div class="layui-input-inline" style="width:55%">
							        <input type="text" name="addtime"  class="layui-input" value="{$res.addtime|date='Y-m-d',###}" readonly="true">
							    </div>
							</div>
                            <div class="layui-inline" style="width: 40%;margin-bottom: 15px;display: none;">
                                <label class="layui-form-label">要求交货时间</label>
                                <div class="layui-input-inline" style="width:55%">
                                     <input type="text" name="end_time" id="end_date" class="layui-input" value="{$res.end_time}" readonly="true">
                                </div>
<!--                                <button class="layui-btn" id="refresh" onclick="" type='button'>
                                    刷新时间
                                </button>-->
                            </div>
                            <div class="layui-inline" style="width: 40%;margin-bottom: 15px;display: none;">
                                <label class="layui-form-label" >生产完成时间</label>
                                <div class="layui-input-inline" style="width:55%">
                                     <input type="text" name="make_time" id="make_date" class="layui-input" value="{$res.make_time}" readonly="true"> 
                                </div>
                            </div>
                            <div class="layui-inline" style="display: none;">
                                <label class="layui-form-label">是否打印</label>
                                <div class="layui-input-inline">
                                <select name='is_printing'>
                                    <option value="0" {if condition="$res['is_printing'] eq 0"}selected{/if}>未打印</option>
                                    <option value="1" {if condition="$res['is_printing'] eq 1"}selected{/if}>已打印</option>
                                </select>
                                </div>
                            </div>
                            <div class="layui-inline" style="width: 40%;margin-bottom: 15px;display: none;">
                                <label class="layui-form-label">经销商名称</label>
                                <div class="layui-input-inline" style="width: 55%">
                                    <input type="text" name="dealer" required  lay-verify="required"  class="layui-input" value="{$res.dealer}" readonly="true">
                                </div>
                            </div>
                            <div class="layui-inline" style="width: 40%;margin-bottom: 15px;display: none;">
                                <label class="layui-form-label">电话</label>
                                <div class="layui-input-inline" style="width: 55%">
                                    <input type="text" name="phone" required  lay-verify="required"  class="layui-input" value="{$res.phone}" readonly="true">
                                </div>
                            </div>
                            <div class="layui-inline" style="width: 40%;display: none;">
                                <label class="layui-form-label">地址</label>
                                <div class="layui-input-inline" style="width:55%">
                                    <input type="text" name="address" class="layui-input" value="{$res.address}" readonly="true">
                                </div>
                            </div>
                            
                            <div class="layui-form-item">
                                <label class="layui-form-label">订单类型</label>
                                <div class="layui-input-block" style="width: 50%">
                                    <input type="radio" name="type" value="1" title="常规" {if condition="$res['type'] eq 1"}checked{/if}>
                                    <input type="radio" name="type" value="2" title="加急" {if condition="$res['type'] eq 2"}checked{/if}>
                                    <input type="radio" name="type" value="3" title="样板" {if condition="$res['type'] eq 3"}checked{/if}>
                                    <input type="radio" name="type" value="4" title="返修单" {if condition="$res['type'] eq 4"}checked{/if}>
                                    <input type="radio" name="type" value="5" title="单剪网" {if condition="$res['type'] eq 5"}checked{/if}>
                                    <input type="radio" name="type" value="6" title="单切料" {if condition="$res['type'] eq 6"}checked{/if}>
                                    <input type="radio" name="type" value="7" title="工程" {if condition="$res['type'] eq 7"}checked{/if}>
																		<input type="radio" name="type" value="8" title="重做" {if condition="$res['type'] eq 8"}checked{/if}>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">备注</label>
                                <div class="layui-input-block" style="width: 63%;"> 
                                    <input type="text" name="note"  class="layui-input" value="{$res.note}" readonly="true">
                                </div>
                            </div>
                            <table class="layui-table">
                                <tbody class='alldisplay'>
                                    <tr>
                                        <td>总金额:<span style='color: red' id="total_price">{$res.total_price}</span></td>

                                        <td>总面积:<span style='color: red' id='total_area'>{$res['area']}</span></td>
                                        <td>产品面积:<span style='color: red' id='total_area'>{$res['product_area']-$material_parea}</span></td>
                                        <td>总数量:<span style='color: red' id='total_count'>{$res.count}</span></td>

                                    </tr>
                                </tbody>
                            </table>
                            <div class="layui-form-item">
                                <input name="order_id" id="order_id" type="hidden" value="{$orderid}"/>
                                <button class="layui-btn" lay-filter="edit" lay-submit="" style="margin:10px 0 0 15%;display: none;">
                                   <i class="layui-icon"></i>保存基础信息
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-header" style="padding: 10px 15px;display: none;">
                            {if condition="$res.dealer_status eq 0"}
                            <button class="layui-btn" onclick="xadmin.open('添加产品', '{:url('order/addProduct',array('orderid'=>$orderid))}', 1200, 600)" type='button'>
                                <i class="layui-icon"></i>添加产品
                            </button>
                            {/if}
                        </div>
                        <div class="layui-card-body " style="padding-bottom: 0px;">

                            <blockquote class="layui-elem-quote" style="margin: 0px;background: #c3c3c3;font-size: 14px; color: #000;">产品信息</blockquote>                       
                            <button class="layui-btn" type='button' id="product-reload" style=" position: relative;left: 90%;top:-40px;display: none;">
                                <i class="layui-icon"></i>刷新报价
                            </button>
                        </div>
                        <style type="text/css">
                          .layui-card-body > div{ margin-top: 0px; }
                        </style>
                        <div class="layui-card-body " style="padding-top: 0px;">
                            <table class="layui-table layui-form" id="product-table" lay-filter="product-table" style="margin: 0px;">

                            </table>
                        </div>



                    </div>
                </div>
            </div>
        </div>
    </form>
    <div class="x-nav">
            <span>
                <!--<a href="">订单信息</a>-->
               <a href="javascript:history.back(-1)"style="background: #009688;padding: 5px 10px;color: #fff;"><i class="icon iconfont">&#xe697</i>返回</a>
            </span> 
            
            <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
                <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
            </a>
        </div>
</body>

<script>
    layui.use(['laydate', 'form','table'],
            function () {
                var laydate = layui.laydate;
                var form = layui.form;
                var $ = layui.jquery;
                var table = layui.table;

                //转换静态表格
                table.init('diy', {

                });

                //执行一个laydate实例

                
                //调用winform里的打印方法
                $(function(){
                    var number = "{$res['number']}";
                    var is_print = "{$res['is_printing']}";
                    $("#winform-print").click(function () {
                           var a = getuserName.getName(number);
                    });
               })
                
                var table = layui.table;
                var order_id = $('#order_id').val();
                //产品表格
                table.render({
                    elem: '#product-table'
                    ,url:'{:url('order/productTable')}?order_id='+order_id
                    ,cols: [[
                      {type:'numbers',title:'编号',width:50}
                      ,{field:'name',title:'名称',width:100}
                      ,{field:'material',title:'材质',minWidth:217}
                      ,{field:'flower_type',title:'型号',maxwidth:87}
                      ,{field:'color_name',title:'铝材/花件颜色',width:110}
                      ,{field:'㎡',title:'单位',templet:"<div>㎡</div>"}
                      ,{field:'all_width',title:'宽',width:70,minWidth:70}
                      ,{field:'all_height',title:'高',width:70,minWidth:70}
                      ,{field:'count',title:'个数'}
                      ,{field:'area',title:'报价面积',width:79}
                      ,{field:'product_area',title:'产品面积',width:79}
                      ,{field:'price',title:'单价',width:70,minWidth:70}
                      ,{field:'rebate',title:'折扣',width:70,minWidth:70}
                       ,{field:'rebate_price',title:'折后价',width:70,minWidth:70}
                        ,{field:'all_price',title:'总金额',width:70,minWidth:70}
//                         ,{field:'structure',title:'结构图',templet:"#tpmPic",minWidth:90}
//                        ,{field:'om_id',title:'操作',toolbar:'#ptoolBar',minWidth:80}
                    ]]
                  });   

                  
                //监听产品单元格编辑
                table.on('edit(product-table)', function(obj){
                  var value = obj.value //得到修改后的值
                  ,data = obj.data //得到所在行所有键值
                  ,field = obj.field; //得到字段
                   $.post("{:url('editProductPrice')}", {data:data,field:field,value:value,order_id:{$orderid},total_price:$('#total_price').text()}, 
                   function(obj){                         
                       if(obj.code == 0){
//                           layer.msg(obj.msg, {icon: 1,time:1000});
//                           $('#total_price').text(obj.data);
//                           table.reload('product-table');  //重载数据表格
                           return;
                       }
                       layer.msg(obj.msg, {icon: 2});
                   },'json');  
                  
                });  
            
                //点击按钮重载产品表格
                $('#product-reload').click(function(){
                   table.reload('product-table');  //重载数据表格
                   //JS更新订单总价，数量等
                   $.post("{:url('findTotal')}", {order_id:order_id},function(obj){  
                        $('#total_price').text(obj.data.total_price);  
                        $('#total_area').text(obj.data.area); 
                        $('#total_count').text(obj.data.count); 
                   },'json'); 
                })
                    
                //监听提交表单
                form.on('submit(edit)',
                        function (data) {                            
                            ajaxform("{:url('edit')}", data.field,1);
                            return false;
                        });
                        
                $(document).on('keydown', '.layui-input',
                function(event) {
                    var td = $(this).parent('td'),    
                    tr = td.parent('tr'),
                    trs = tr.parent().parent().find('tr'),
                    tr_index = tr.index(),
                    td_index = td.index(),
                    td_last_index = tr.find('[data-edit="text"]:last').index(),
                    td_first_index = tr.find('[data-edit="text"]:first').index();

                    switch (event.keyCode) {
                    case 39:
                        td.nextAll('[data-edit="text"]:first').click();
                        if(td_index == td_last_index){
                            tr.next().find('td').eq(td_first_index).click();
                            if(tr_index == trs.length -1)
                                trs.eq(0).find('td').eq(td_first_index).click();
                        }
                        setTimeout(function(){$('.layui-table-edit').select()},0);
                        break;  
                    case 37:
                        td.prevAll('[data-edit="text"]:first').click();
                        setTimeout(function(){$('.layui-table-edit').select()},0);
                        break;
                    case 38:
                        tr.prev().find('td').eq(td_index).click();
                        setTimeout(function(){$('.layui-table-edit').select()},0);
                        break;
                    case 40:
                        tr.next().find('td').eq(td_index).click();
                        setTimeout(function(){$('.layui-table-edit').select()},0);
                        break;
                    }
                })
                $(function(){
                    
                    var height=sessionStorage.getItem('height');
                    if(height!=null){
                        setTimeout(function(){ $(document).scrollTop(height)},800)
                        
                    }
                    sessionStorage.removeItem('height');
                    //刷新时间
                    $('#refresh').click(function(){
                        var order_id = {$orderid};
                        ajaxform("{:url('refreshTime')}",{order_id:order_id},1);
                    })
                })
            });
        function open_group(title, url){
            var index = layer.open({
                type: 2,
                area: [ '1200px',  '600px'],
                fix: false, //不固定
                maxmin: true,
                shadeClose: false,
                shade: 0.4,
                title: title,
                content: url,
                cancel: function(index, layero){ 
                    layer.close(index);
                    window.location.reload(); //刷新父页面
                    return false; 
                }
            });
        }   
        //删除组合单
        function group_del(obj, id) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                var order_id = {$orderid};
                ajaxform("{:url('delGroup')}",{id:id,order_id:order_id},1);
            });
        } 
    
        /*删除产品*/
        function member_del(obj, id) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                var order_id = {$orderid};
                ajaxform("{:url('delProduct')}",{id:id,order_id:order_id},1);
            });
        }
        /*删除原材料*/
        function material_del(obj, id,price) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                var order_id = {$orderid};
                ajaxform("{:url('delMaterial')}",{id:id,price:price,order_id:order_id},1);
            });
        }
        //复制原材料
        function mcopy(id){
            layer.confirm('确认要复制吗？',{ 
                btn:['确认','取消'],
                success:function(){
                    this.enterEsc = function (event) {
                        if (event.keyCode === 13) {
                            $(".layui-layer-btn0").click();
                            return false; //阻止系统默认回车事件
                        }
                    };
                    $(document).on('keydown', this.enterEsc); //监听键盘事件，关闭层
                },
                end:function(){
                    $(document).off('keydown',this.enterEsc); //解除键盘关闭事件
                }
            },function(index){
                var order_id = $('#order_id').val();
               ajaxform("{:url('mcopy')}",{id:id,order_id:order_id},1);
            });
        }
        //复制组合单
        function gcopy(id){
             layer.confirm('确认要复制吗？',{ 
                btn:['确认','取消'],
                success:function(){
                    this.enterEsc = function (event) {
                        if (event.keyCode === 13) {
                            $(".layui-layer-btn0").click();
                            return false; //阻止系统默认回车事件
                        }
                    };
                    $(document).on('keydown', this.enterEsc); //监听键盘事件，关闭层
                },
                end:function(){
                    $(document).off('keydown',this.enterEsc); //解除键盘关闭事件
                }
            },function(index){
               ajaxform("{:url('gcopy')}",{id:id},1);
            });
        }
        //复制产品
        function pcopy(id,order_id,obj){
            var pwidth = $(obj).offset().top;
            layer.confirm('确认要复制吗？',{ 
                btn:['确认','取消'],
                success:function(){
                    this.enterEsc = function (event) {
                        if (event.keyCode === 13) {
                            $(".layui-layer-btn0").click();
                            return false; //阻止系统默认回车事件
                        }
                    };
                    $(document).on('keydown', this.enterEsc); //监听键盘事件，关闭层
                },
                end:function(){
                    $(document).off('keydown',this.enterEsc); //解除键盘关闭事件
                }
            },function(index){
                ajaxform("{:url('pcopy')}",{id:id,order_id:order_id},1);
                sessionStorage.setItem("height", pwidth);
                 
            });
        }
</script>

</html>
