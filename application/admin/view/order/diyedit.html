{include file="public/header"/}
<style>
    .layui-table img{max-width: 50px;max-height: 50px;}
</style>   
<body>
     <form class="layui-form layui-col-space5">
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <table class="layui-table layui-form">
                    <thead>
                        <tr>                                        
                            <th>安装位置</th>
                            <th>材质-花类</th>
                            <th>铝型/花件颜色</th>
                            <th>总宽</th>
                            <th>总高</th>
                            <th>数量</th>
                            <th>产品面积</th>
                            <th>报价面积</th>
                            <th>单价</th>
                            <th>总价</th>
                            <th>产品图片</th>
<!--                            <th width="12%">操作</th>-->
                        </tr>
                    </thead>
                    <tbody id="table">
                        <tr class="clone">
														<td><input name="position[]" type="text"  class="layui-input" placeholder="安装位置" value="{$res.position}"/></td>
                            <td><input name="name[]" type="text"  class="layui-input" placeholder="材质-花类" value="{$res.material}"/></td>
                            <td><input name="color_name[]" type="text"  class="layui-input" placeholder="铝型/花件颜色" value="{$res.color_name}"/></td>
                            <td class="width-td"><input name="width[]" type="text" lay-verify="required" class="layui-input width all" value="{$res.all_width}"/></td>
                            <td class="height-td"><input name="height[]" type="text" lay-verify="required" class="layui-input height all" placeholder="单位:mm" value="{$res.all_height}"/></td>
                            <td class="count-td"><input name="count[]" type="number" lay-verify="required" class="layui-input count all" placeholder="数值" value="{$res.count}"/></td>
                            <td class="product-area-td"><input name="product_area[]" type="text" lay-verify="required" class="layui-input product-area" placeholder="自动计算" value="{$res.product_area}" readonly="true"/></td>
                            <td class="area-td"><input name="area[]" type="text" lay-verify="required" class="layui-input area all" value="{$res.area}"/></td>
                            <td class="price-td"><input name="price[]" type="text" lay-verify="required" class="layui-input one-price" value="{$res.price}"/></td>
                            <td class="all-price-td"><input name="all_price[]" lay-verify="required" type="text" class="layui-input all_price" value="{$res.all_price}"/></td>
                            <td>
                                {if condition="$res['diy_pic'] eq ''"}
                                <button type="button" class="layui-btn layui-btn-radius layui-btn-normal upload-pic">点击上传</button>
                                {else/}
                                <img src="/upload/{$res['diy_pic']}">
                                <input name="diy_pic[]" type="hidden" value="/upload/{$res['diy_pic']}">
                                {/if}
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="layui-col-md12">
                <input name="op_id" type="hidden" value="{$res.op_id}"/>
                <input name="order_id" type="hidden" value="{$res.order_id}"/>
                <button class="layui-btn" lay-filter="add" lay-submit="" style="margin-left: 40%;">立即保存</button>              
            </div>
        </div>
    </div>
     </form>
</body>
<script>
    layui.use(['laydate', 'form','upload'],
            function () {
                var form = layui.form;
                var upload = layui.upload;

                $('.upload-pic').each(function(){
                    var type = $(this).attr('type');
                    var code = $(this).attr('code');
                    var pic_obj = $(this);
                    var uploadInst = upload.render({
                        elem: this //绑定元素
                        , url: "{:url('bom/upload')}" //上传接口
                        , data: {type:type,code:code}
                        , size: 800000 //限制文件大小，单位 KB
                        , method: 'post'
                        , accept: 'file'
                        , exts: "jpg|jpeg|png"
                        , before:function(){ layer.load()}
                        , done: function (res) {
                            layer.closeAll('loading');
                            if(res.code==0){
                                var html = '<img src=/upload/'+res.data+'>';
                                var input = "<input name='diy_pic[]' type='hidden' value='"+res.data+"'>";
                                pic_obj.css('display','none');
                                pic_obj.after(html);
                                pic_obj.after(input);
                                return false;
                            }
                            layer.msg(res.msg,{icon:2})
                        }
                        , error: function () {
                            //请求异常回调
                        }
                    });
                })

                //监听提交表单
                form.on('submit(add)',
                        function (data) {                            
                            ajaxform("{:url('diyedit')}", data.field);
                            return false;
                        });

            });
</script>
<script src="__STATIC__/js/jquery.min.js" charset="utf-8"></script>
<script>
    $(function(){


         //计算面积-宽
        $('#table').on('change','.width',function(){
            var width = $(this).val();
            var height = $(this).parent().nextAll('.height-td').find('input').val();
            var count = $(this).parent().nextAll('.count-td').find('input').val();
            var area = (Number(width)*Number(height))/1000000*Number(count);
            var area_d = $(this).parent().nextAll('.product-area-td').find('input'); //产品面积dom
            area_d.val(area.toFixed(2));
        })
        
        //计算面积-高
        $('#table').on('change','.height',function(){
            var width = $(this).parent().prevAll('.width-td').find('input').val();
            var height = $(this).val();
            var count = $(this).parent().nextAll('.count-td').find('input').val();
            var area = (Number(width)*Number(height))/1000000*Number(count);
            var area_d = $(this).parent().nextAll('.product-area-td').find('input'); //产品面积dom
            area_d.val(area.toFixed(2));

        })

        //计算面积-数量
        $('#table').on('change','.count',function(){
            var width = $(this).parent().prevAll('.width-td').find('input').val();
            var height = $(this).parent().prevAll('.height-td').find('input').val();
            var area = (Number(width)*Number(height))/1000000*Number($(this).val());
            var area_d = $(this).parent().nextAll('.product-area-td').find('input'); //产品面积dom
            area_d.val(area.toFixed(2));
        })

        //计算价格-报价面积
        $('#table').on('change','.area',function(){
            var area = $(this).val();
            var price = $(this).parent().nextAll('.price-td').find('input').val();
            var _all_price = $(this).parent().nextAll('.all-price-td').find('input');
            var all = (Number(area)*Number(price)).toFixed(2);
            _all_price.val(all);console.log(all);
        })

        //计算价格-单价
        $('#table').on('change','.one-price',function(){
            var area = $(this).parent().prevAll('.area-td').find('input').val();
            var price = $(this).val();
            var _all_price = $(this).parent().nextAll('.all-price-td').find('input');
            var all = (Number(area)*Number(price)).toFixed(2);
            _all_price.val(all);
        })

    })
    //复制
    function copy(obj){
        var html = $(obj).parents('.clone').clone();
        $(obj).parents('.clone').after(html);
    }
    //删除
    function del(obj){
        $(obj).parents('tr').remove();
    }
</script>
</html>
