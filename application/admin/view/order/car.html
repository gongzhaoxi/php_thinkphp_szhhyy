{include file="public/header"/}
    
    <body>
        <div class="x-nav">
            <span class="layui-breadcrumb">
               <a href="javascript:void(0)">已下车间订单</a>
            </span> 
            
            <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
                <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
            </a>
        </div>
        <div class="layui-fluid">
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-body ">
                            
                        </div>
                        <div class="layui-card-header">
                            <form class="layui-form layui-col-space5" >
                                
                                <div class="layui-input-inline layui-show-xs-block">
                                    <input type="text" name="keyword" placeholder="请输入名称/编号" autocomplete="off" class="layui-input">
                                </div>
                                <div class="layui-input-inline layui-show-xs-block">
                                    <button class="layui-btn" lay-submit="" lay-filter="sreach">
                                        <i class="layui-icon">&#xe615;</i>
                                    </button>
                                </div>
                                <div class="layui-input-inline" style="float: right">
                                    <!--<button class="layui-btn layui-btn-danger" type='button' onclick="delAll()"><i class="layui-icon"></i>批量删除</button>-->
<!--                                    <button class="layui-btn" onclick="xadmin.open('添加物料', '{:url('aluminumAdd')}', 600, 400)" type='button'>
                                        <i class="layui-icon"></i>添加物料
                                    </button>
                                    <button class="layui-btn layui-btn-normal" type='button' onclick="xadmin.open('添加用户', './order-add.html', 800, 600)">
                                        <i class="layui-icon"></i>导入数据
                                    </button>
                                    <button class="layui-btn layui-btn-warm" type='button' onclick="xadmin.open('添加用户', './order-add.html', 800, 600)">
                                        <i class="layui-icon"></i>导出数据
                                    </button>-->
                                </div>
                            </form>
                        </div>
                        <div class="layui-card-body ">
                            <table class="layui-table layui-form">
                                <thead>
                                    <tr>                                       
                                        <th>订单编号</th>
                                        <th>经销商</th>
                                        <th>下单时间</th>
                                        <th>数量</th>
                                        <th>面积</th>
                                        <th>总金额</th>
                                        <th>已收款</th>
                                        <th>未收款</th>
                                        <th>要求交货时间</th>
                                        <th>生产状态</th>
                                        <th>操作</th></tr>
                                </thead>
                                <tbody>
                                    {volist name="list" id="v"}
                                    <tr>
                                        <td>{$v.number}</td>
                                        <td>{$v.dealer}</td>
                                        <td>{$v.addtime|date='Y/m/d',###}</td>
                                        <td>{$v.count}</td>
                                        <td>{$v.area}</td>
                                        <td>{$v.total_price}</td>
                                        <td>{$v.have_pay}</td>
                                        <td>{$v.no_pay}</td>
                                        <td>{$v.end_time}</td>
                                        <td>暂无状态</td>                                        
                                        <td class="td-manage">
                                            <a title="查看" href="{:url('Carorder/readOrder',array('id'=>$v['id']))}">
                                                <i class="layui-icon">&#xe63c;</i></a>
                                            </a>
                                        </td>
                                    </tr>
                                     {/volist}
                                </tbody>
                            </table>
                        </div>
                        <div class="layui-card-body ">
                            <div class="page">
                                    {$page}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script>layui.use(['laydate', 'form'],
        function() {
            var laydate = layui.laydate;
            var  form = layui.form;
            
            //执行一个laydate实例
            laydate.render({
                elem: '#start' //指定元素
            });

            //执行一个laydate实例
            laydate.render({
                elem: '#end' //指定元素
            });
            
            // 监听全选
            form.on('checkbox(checkall)', function(data){

              if(data.elem.checked){
                $('tbody input').prop('checked',true);
              }else{
                $('tbody input').prop('checked',false);
              }
              form.render('checkbox');
            });
        });

       function sendCar(id){
            layer.confirm('确认要发送吗？',
            function(index) {
                //发异步删除数据
                ajaxform("{:url('sendCar')}",{id:id},1);
            });
       }

        /*删除*/
        function member_del(obj, id) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                ajaxform("{:url('bom/aluminumDel')}",{id:id},1);
            });
        }
    
        
    </script>

</html>
