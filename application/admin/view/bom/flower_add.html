{include file="public/header"/}
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form">
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    物料编号
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="code" name="code" required="" lay-verify="required" class="layui-input" value="{$res.code}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>不可重复，不能为空
                </div>
            </div>

                <label for="username" class="layui-form-label">
                    缩略图
                </label>
                <div class="layui-input-inline">
                    <button type="button" class="layui-btn" id="test1">

                    </button>
                </div>

                    <span class="x-red">*</span>最大6m,格式jpg,png,gif,bmp,jpeg,pdf
                </div>
            </div>
            <div class="layui-form-item" id="picbox" style="{if condition="$res['pic'] eq ''"}display: none{/if}">
                <label for="username" class="layui-form-label">                           
                </label>
                <div class="layui-input-inline">
                    <div class="layui-upload-list">
                        <img class="layui-upload-img" src="/upload/{$res.pic}" id="prepic" style="max-height: 60px">
                        <input name="pic" id="pic" type="hidden" value="{$res.pic}"/>

                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    物料名称
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="name" name="name" required="" lay-verify="required" class="layui-input" value="{$res.name}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm

            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    最小高
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="min_height" name="min_height" required="" lay-verify="required" class="layui-input" value="{$res.min_height}">
                </div>

                </div>
            </div>
            <div class="layui-form-item">
                <label for="phone" class="layui-form-label">
                    最小宽
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="min_width" name="min_width" required="" lay-verify="required" class="layui-input" value="{$res.min_width}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    最大高
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="max_height" name="max_height" required="" lay-verify="required" class="layui-input" value="{$res.max_height}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div>
            <div class="layui-form-item">
                <label for="phone" class="layui-form-label">
                    最大宽
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="max_width" name="max_width" required="" lay-verify="required" class="layui-input" value="{$res.max_width}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div>                      
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    是否可切
                </label>
                <div class="layui-inline">
                    <select name="is_cut">
                        <option value="0" {if condition="$res['is_cut'] eq 0"}selected{/if}>否</option>
                        <option value="1" {if condition="$res['is_cut'] eq 1"}selected{/if}>是</option>
                    </select>
                </div>
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    最小高
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="cut_min_height" name="cut_min_height" class="layui-input" value="{$res.cut_min_height}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div>
            <div class="layui-form-item">
                <label for="phone" class="layui-form-label">
                    最小宽
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="cut_min_width" name="cut_min_width" class="layui-input" value="{$res.cut_min_width}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    最大高
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="cut_max_height" name="cut_max_height" class="layui-input" value="{$res.cut_max_height}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div>
            <div class="layui-form-item">
                <label for="phone" class="layui-form-label">
                    最大宽
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="cut_max_width" name="cut_max_width" class="layui-input" value="{$res.cut_max_width}">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <span class="x-red">*</span>单位mm
                </div>
            </div> 
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    单位
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="unit" name="unit"  class="layui-input" value="{$res.unit}">
                </div>
                        
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    价格
                </label>
                <div class="layui-input-inline">
                    <input type="text" id="price" name="price"  class="layui-input" value="{$res.price}">
                </div>                        
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">
                    绑定结构
                </label>
                <div class="layui-input-inline">
                    <button class="layui-btn layui-btn-normal" type="button" onclick="show_formula(this,{$res.id})">选择</button>
                </div>                        
            </div>
            <div class="layui-form-item">
                <label for="L_repass" class="layui-form-label"></label>
                <input name='id' type='hidden' value='{$id}'/>
                <button class="layui-btn" lay-filter="add" lay-submit="">增加</button>
            </div>
        </form>
    </div>
</div>
<script>layui.use(['form', 'layer', 'upload'],
            function () {
                $ = layui.jquery;
                var form = layui.form,
                layer = layui.layer;

                var upload = layui.upload;
                //执行上传实例
                var uploadInst = upload.render({
                    elem: '#test1' //绑定元素
                    , url: "{:url('bom/upload')}" //上传接口
                    , size: 8000 //限制文件大小，单位 KB
                    , method: 'post'
                    , fileAccept: 'image/*'
                    , exts: "jpg|png|gif|bmp|jpeg|pdf"
                    , done: function (res) {
                        //上传完毕回调
                        $('#picbox').css('display','block');
                        $('#prepic').attr('src', "/upload/" + res.data);
                        $('#pic').val(res.data);
                    }
                    , error: function () {
                        //请求异常回调
                    }
                });
                //监听提交
                form.on('submit(add)',
                        function (data) {
                            ajaxform("{:url('bom/flowerAdd')}",data.field);
                            return false;
                        });

            });
              //弹出选择公式
        function show_formula(obj,id){
            layer.open({type: 2, content: '/admin/bom/flowerStructure/id/'+id+'.html',area:['800px','500px'],btn:['离开'],
                shadeClose:true,
                yes: function (index, layero) {
                    //引用弹出层的回调函数
                    var res = window["layui-layer-iframe" + index].callbackdata();
                    $(obj).nextAll('#ruler_name').val(res.ruler_name);
                    $(obj).nextAll('#calculate_name').val(res.calculate_name);
                    $(obj).nextAll('#ruler').val(res.ruler);
                    $(obj).nextAll('#calculate').val(res.calculate);
                    layer.close(index);
                }});
        }
</script>

</body>

</html>
