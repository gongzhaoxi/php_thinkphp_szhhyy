{include file="public/header"/}
    
    <body>
        <div class="x-nav">
            <span class="layui-breadcrumb">
                <a href="#">把手</a>
            </span>
            <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">
                <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
            </a>
        </div>
        <div class="layui-fluid">
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md12">
                    <div class="layui-card">
                        <div class="layui-card-body ">
                            
                        </div>
                        <div class="layui-card-header">
                            <form class="layui-form layui-col-space5">
                                
                                <div class="layui-input-inline layui-show-xs-block">
                                    <input type="text" name="keyword" placeholder="请输入名称/编号" autocomplete="off" class="layui-input">
                                </div>
                                <div class="layui-input-inline layui-show-xs-block">
                                    <button class="layui-btn" lay-submit="" lay-filter="sreach">
                                        <i class="layui-icon">&#xe615;</i>
                                    </button>
                                </div>
                                <button class="layui-btn layui-btn-normal" type='button' id="sort-btn">
                                    一键更新排序
                                </button>
                                <p class="layui-word-aux" style="display: inline;font-size: 13px;">注:数字越小,则添加订单时的排列越靠前</p>
                                <div class="layui-input-inline" style="float: right">
                                    <button class="layui-btn layui-btn-danger" onclick="delAll()" type="button">
                                        <i class="layui-icon"></i>批量删除
                                    </button>
                                    <button class="layui-btn" onclick="xadmin.open('添加物料', '{:url('handsAdd')}', 600, 400)" type='button'>
                                        <i class="layui-icon"></i>添加物料
                                    </button>
                                    <button class="layui-btn layui-btn-normal" type='button' id='import'>
                                        <i class="layui-icon"></i>导入数据
                                    </button>
                                    <a class="layui-btn layui-btn-warm" href="{:url('bom/exportHands')}">
                                        <i class="layui-icon"></i>导出数据
                                    </a>

                                </div>
                            </form>
                        </div>
                        <div class="layui-card-body ">
                            <table class="layui-table layui-form">
                                <thead>
                                    <tr>
                                        <th style="width: 1%">
                                            <input type="checkbox" name="" lay-filter="checkall" lay-skin="primary" >
                                        </th>
                                        <th>物料编号</th>
                                        <th>物料名称</th>
                                        <th>宽</th>
                                        <th>高</th>
                                        <th>单位</th>
                                        <th>单价</th>
                                        <th>操作</th>
                                        <th style="width: 5%">排序</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {volist name="list" id="v"}
                                    <tr>
                                        <td>
                                            <input type="checkbox" name="id" lay-skin="primary" value="{$v['id']}">
                                        </td>
                                        <td>{$v.code}</td>
                                        <td>{$v.name}</td>
                                        <td>{$v.width}</td>
                                        <td>{$v.height}</td>
                                        <td>{$v.unit}</td>
                                        <td>{$v.price}</td>
                                        <td class="td-manage">
                                            <a title="编辑" onclick="xadmin.open('编辑','{:url('handsAdd',array('id'=>$v['id']))}', 600, 400)" href="javascript:;">
                                                <i class="layui-icon">&#xe642;</i>
                                            </a>
                                            <a title="删除" onclick="member_del(this,{$v['id']})" href="javascript:;">
                                                <i class="layui-icon">&#xe640;</i>
                                            </a>
                                        </td>
                                        <td><input type='text' name='sort' value='{$v.sort}' style='width:50%;text-align:center;'></td>
                                    </tr>
                                    {/volist}
                                </tbody>
                            </table>
                        </div>
                        <div class="layui-card-body ">
                            <div class="page">
                                {$page}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script>layui.use(['laydate', 'form','upload'],
        function() {
            var laydate = layui.laydate;
            var  form = layui.form;
             var upload = layui.upload;
            $ = layui.jquery;

             $('#sort-btn').click(function () {
                 var id = [];
                 var sort = [];
                 $('input[name=id]').each(function () {
                     id.push($(this).val());
                 });
                 $('input[name=sort]').each(function () {
                     sort.push($(this).val());
                 });
                 ajaxform("{:url('handsSort')}",{id:id,sort:sort},1);
             });

            // 监听全选
            form.on('checkbox(checkall)', function(data){

              if(data.elem.checked){
                $('tbody input').prop('checked',true);
              }else{
                $('tbody input').prop('checked',false);
              }
              form.render('checkbox');
            });
            
            
               //执行上传实例
            var uploadInst = upload.render({
                elem: '#import' //绑定元素
                , url: "{:url('bom/importHands')}" //上传接口
                , size: 800000 //限制文件大小，单位 KB
                , method: 'post'
                , fileAccept: 'file'
                , exts: "xls|xlsx"
                , before:function(){ layer.load(0,{time: 10*1000,shade:false});}
                , done: function (res) {
                    layer.close();
                    if(res.code==0){
                        layer.msg(res.msg,{icon:1,time:2000},function(){ location.reload();});                        
                        return;
                    }
                    layer.msg(res.msg,{icon:2})
                }
                , error: function () {
                    //请求异常回调
                }
            });
        });

       

        /*删除*/
        function member_del(obj, id) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                ajaxform("{:url('bom/handsDel')}",{id:id},1);
            });
        }
        
        //删除选中的数据
        function delAll (argument) {
            var ids = [];

            // 获取选中的id 
            $('tbody input').each(function(index, el) {
                if($(this).prop('checked')){
                   ids.push($(this).val())
                }
            });
            
            layer.confirm('确认要删除吗？',function(index){
               ajaxform("{:url('bom/handsDel')}",{ids:ids},1);
            });
           
      }
    </script>

</html>
