        <div class="layui-fluid">
            <div class="layui-row layui-col-space15">

                    <div class="layui-card">
                        <div class="layui-card-body ">
                            
                        </div>
                        <div class="layui-card-header">
                            <form class="layui-form layui-col-space5">
                                
                                <div class="layui-input-inline layui-show-xs-block">
                                    <input type="text" name="keyword" placeholder="请输入名称/编号" autocomplete="off" class="layui-input">
                                </div>
                                <div class="layui-input-inline layui-show-xs-block">
                                    <button class="layui-btn" lay-submit="" lay-filter="sreach">

                                <div class="layui-input-inline" style="float: right">
<!--                                    <button class="layui-btn layui-btn-danger" onclick="delAll()" type="button">

                                    </button>-->
                                    <button class="layui-btn" onclick="xadmin.open('添加物料', '{:url('colorAdd')}', 600, 550)" type='button'>
                                        <i class="layui-icon"></i>添加颜色
                                    </button>
                                  
                                </div>

                                    <tr>
<!--                                        <th style="width: 1%;">
                                            <input type="checkbox" name="" lay-filter="checkall" lay-skin="primary">

                                        <th>操作</th></tr>

                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </body>
     <script>layui.use(['laydate', 'form'],
        function() {
            var laydate = layui.laydate;
            var  form = layui.form;
            
            
            // 监听全选
            form.on('checkbox(checkall)', function(data){

              if(data.elem.checked){
                $('tbody input').prop('checked',true);
              }else{
                $('tbody input').prop('checked',false);
              }
              form.render('checkbox');
            });
        });

       

        
        /*删除*/
        function member_del(obj, id) {
            layer.confirm('确认要删除吗？',
            function(index) {
                //发异步删除数据
                ajaxform("{:url('bom/colorDel')}",{id:id},1);
            });
        }
        
        //删除选中的数据
        function delAll (argument) {
            var ids = [];

            // 获取选中的id 
            $('tbody input').each(function(index, el) {
                if($(this).prop('checked')){
                   ids.push($(this).val())
                }
            });
            
            layer.confirm('确认要删除吗？',function(index){
               ajaxform("{:url('bom/colorDel')}",{ids:ids},1);
            });
           
      }
    </script>
    <script src="__STATIC__/js/jquery.min.js" charset="utf-8"></script>
    <script src="__STATIC__/js/treeTable/treeTable.js" type="text/javascript"></script>
    <!--<script src="__STATIC__/js/treeTable/jquery.treetable.js" charset="utf-8"></script>-->  
    <script>
        $(function(){
           $("#tables2").treeTable({
               expandLevel: 2,
               column: 1
           });
        })
 
    </script>

</html>
