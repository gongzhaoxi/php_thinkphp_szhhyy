{include file="public/header"/}        <body>        <div class="x-nav">            <span class="layui-breadcrumb">                <a href="javascript:history.back(-1)" >返回</a><!--                <a>                    <cite>算料公式</cite>                </a>-->            </span>            <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right" onclick="location.reload()" title="刷新">                <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>            </a>        </div>        <div class="layui-fluid">            <div class="layui-row layui-col-space15">                <div class="layui-col-md12">                    <div class="layui-card">                        <div class="layui-card-body ">                                                    </div>                        <div class="layui-card-header">                            <form class="layui-form layui-col-space5">                                                                <div class="layui-input-inline layui-show-xs-block">                                    <input type="text" name="username" placeholder="请输入名称/编号" autocomplete="off" class="layui-input">                                </div>                                <div class="layui-input-inline layui-show-xs-block">                                    <button class="layui-btn" lay-submit="" lay-filter="sreach">                                        <i class="layui-icon">&#xe615;</i>                                    </button>                                </div>                                <div class="layui-input-inline" style="float: right">                                    <button class="layui-btn" onclick="xadmin.open('添加公式', '{:url('addCalculateFormula',array('structure_id'=>$structure_id))}', 1200, 600)" type='button'>                                        <i class="layui-icon"></i>添加公式                                    </button>                                </div>                            </form>                        </div>                        <div class="layui-card-body ">                            <table class="layui-table layui-form">                                <thead>                                    <tr>                                        <th>编号</th>                                        <th>公式名称</th>                                        <th>操作</th></tr>                                </thead>                                <tbody>                                    {volist name='list' id='v' key='k'}                                    <tr>                                        <td>{$k}</td>                                        <td>{$v.name}</td>                                        <td class="td-manage">                                            <a title="编辑" onclick="xadmin.open('编辑','{:url('editCalculateFormula',array('scf_id'=>$v['scf_id'],'structure_id'=>$structure_id))}', 1200, 600)" href="javascript:;">                                                <i class="layui-icon">&#xe642;</i>                                            </a><!--                                            <a title="复制" onclick="xadmin.open('复制','{:url('colorAdd')}', 600, 400)" href="javascript:;">                                                <i class="icon iconfont">&#xe6b9;</i>                                            </a> -->																																												<a title='复制' onclick='colorAdd({$v.scf_id})' href='javascript:;'>																						    <i class='icon iconfont'>&#xe6b9;</i>																						</a>                                            <a title="删除" onclick='member_dela({$v.scf_id})' href="javascript:;">                                                <i class="layui-icon">&#xe640;</i>                                            </a>                                        </td>                                    </tr>                                    {/volist}                                </tbody>                            </table>                        </div>                                      </div>                </div>            </div>        </div>    </body>    <script>layui.use(['laydate', 'form'],        function() {            var laydate = layui.laydate;            //执行一个laydate实例            laydate.render({                elem: '#start' //指定元素            });            //执行一个laydate实例            laydate.render({                elem: '#end' //指定元素            });        });				//复制公式				function colorAdd(id){					layer.confirm('确认要复制吗？',{						btn:['确认','取消'],						success:function(){								this.enterEsc = function (event) {										if (event.keyCode === 13) {												$(".layui-layer-btn0").click();												return false; //阻止系统默认回车事件										}								};								$(document).on('keydown', this.enterEsc); //监听键盘事件，关闭层						},						end:function(){								$(document).off('keydown',this.enterEsc); //解除键盘关闭事件						}					},function(index){							 ajaxform("{:url('colorAdd')}",{id:id},1);						});				}				/*删除*/				function member_dela(id) {					layer.confirm('确认要删除吗？',{						btn:['确认','取消'],						success:function(){								this.enterEsc = function (event) {										if (event.keyCode === 13) {												$(".layui-layer-btn0").click();												return false; //阻止系统默认回车事件										}								};								$(document).on('keydown', this.enterEsc); //监听键盘事件，关闭层						},						end:function(){								$(document).off('keydown',this.enterEsc); //解除键盘关闭事件						}					},function(index){							 ajaxform("{:url('memberDela')}",{id:id},1);						});				}        /*用户-停用*/        function member_stop(obj, id) {            layer.confirm('确认要停用吗？',            function(index) {                if ($(obj).attr('title') == '启用') {                    //发异步把用户状态进行更改                    $(obj).attr('title', '停用');                    $(obj).find('i').html('&#xe62f;');                    $(obj).parents("tr").find(".td-status").find('span').addClass('layui-btn-disabled').html('已停用');                    layer.msg('已停用!', {                        icon: 5,                        time: 1000                    });                } else {                    $(obj).attr('title', '启用');                    $(obj).find('i').html('&#xe601;');                    $(obj).parents("tr").find(".td-status").find('span').removeClass('layui-btn-disabled').html('已启用');                    layer.msg('已启用!', {                        icon: 5,                        time: 1000                    });                }            });        }        /*用户-删除*/        function member_del(obj, id) {            layer.confirm('确认要删除吗？',            function(index) {                //发异步删除数据                $(obj).parents("tr").remove();                layer.msg('已删除!', {                    icon: 1,                    time: 1000                });            });        }        function delAll(argument) {            var data = tableCheck.getData();            layer.confirm('确认要删除吗？' + data,            function(index) {                //捉到所有被选中的，发异步进行删除                layer.msg('删除成功', {                    icon: 1                });                $(".layui-form-checked").not('.header').parents('tr').remove();            });        }</script></html>
